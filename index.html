<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Simple Mobile AR Lab - Motor Status</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
    }

    #top-panel {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: min(92vw, 520px);
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.68);
      color: white;
      text-align: center;
      font-size: 15px;
      line-height: 1.4;
      backdrop-filter: blur(4px);
    }

    #controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 12px;
      flex-wrap: wrap; /* รองรับกรณีหน้าจอมือถือแคบ */
    }

    button {
      min-width: 110px;
      min-height: 48px;
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }
